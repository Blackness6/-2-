global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "task-api-local"
    metrics_path: /metrics

    static_configs:
      - targets:
          - "api:8001"

  - job_name: "task-api-render"
    scheme: https
    metrics_path: /metrics

    static_configs:
      - targets:
          - "2-2-ih4n.onrender.com"