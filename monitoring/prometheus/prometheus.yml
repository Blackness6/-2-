global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "task-api-local"
    metrics_path: /metrics
    # Пароль НЕ хранится здесь (файл в git). Читается из смонтированного
    # секрет-файла — см. volume в docker-compose и monitoring/prometheus/metrics_password.
    basic_auth:
      username: metrics
      password_file: /etc/prometheus/metrics_password

    static_configs:
      - targets:
          - "api:8001"

  - job_name: "task-api-render"
    scheme: https
    metrics_path: /metrics
    basic_auth:
      username: metrics
      password_file: /etc/prometheus/metrics_password

    static_configs:
      - targets:
          - "2-2-ih4n.onrender.com"
