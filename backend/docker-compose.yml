services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: beibarys
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beibarys -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: task_manager
      DB_USER: beibarys
      DB_PASSWORD: postgres
      SECRET_KEY: super-secret-key-change-me
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
